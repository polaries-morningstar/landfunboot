server:
  port: 8080

spring:
  application:
    name: landfunboot

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:landfunboot}?createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
    web:
      pageable:
        one-indexed-parameters: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    locations: classpath:db/migration
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:landfunboot}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true&rewriteBatchedStatements=true&useSSL=false&allowPublicKeyRetrieval=true
    user: ${DB_USER:root}
    password: ${DB_PASSWORD:}

springdoc:
  default-flat-param-object: true

debug: false

landfun:
  jwt:
    secret: ${JWT_SECRET:}
    expire: ${JWT_EXPIRE_SECONDS:2592000}
  storage:
    type: local
    local:
      base-path: ${LANDFUN_STORAGE_LOCAL_BASE_PATH:./uploads}
    s3:
      endpoint: ${S3_ENDPOINT:}
      bucket: ${S3_BUCKET:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}

logging:
  level:
    root: INFO
    com.landfun.boot: DEBUG
    org.flywaydb: INFO
    org.babyfish.jimmer.sql.ast: TRACE
    org.babyfish.jimmer.sql: DEBUG
    org.springframework.jdbc: DEBUG
