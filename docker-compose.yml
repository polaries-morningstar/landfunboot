services:
  mysql:
    image: mysql:8.0
    container_name: landfun-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - landfun-network

  redis:
    image: redis:7-alpine
    container_name: landfun-redis
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    networks:
      - landfun-network
    # 不映射到宿主机端口，仅供 compose 内 app 使用，避免与宿主机已有 redis 冲突

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: landfun-app
    depends_on:
      - mysql
      - redis
    environment:
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-landfunboot}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - LANDFUN_STORAGE_LOCAL_BASE_PATH=/var/www/uploads
    volumes:
      - uploads_data:/var/www/uploads
    networks:
      - landfun-network

  frontend:
    build:
      context: ./landfunboot-vue-frontend
      dockerfile: Dockerfile
    container_name: landfun-frontend
    volumes:
      - frontend_dist:/app/dist
    command: ["sh", "-c", "cp -r /app/built/. /app/dist && tail -f /dev/null"]
    networks:
      - landfun-network

  nginx:
    image: nginx:alpine
    container_name: landfun-nginx
    ports:
      - "8881:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - app
      - frontend
    networks:
      - landfun-network

networks:
  landfun-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  frontend_dist:
