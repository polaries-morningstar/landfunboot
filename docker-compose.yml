version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: landfun-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - landfun-network

  redis:
    image: redis:alpine
    container_name: landfun-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - landfun-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: landfun-app
    depends_on:
      - mysql
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - SPRING_DATA_REDIS_URL=redis://redis:6379
      - LANDFUN_JWT_SECRET=${JWT_SECRET}
      - LANDFUN_STORAGE_LOCAL_BASE_PATH=/var/www/uploads
    volumes:
      - uploads_data:/var/www/uploads
    networks:
      - landfun-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: landfun-frontend
    volumes:
      - frontend_dist:/app/dist
    networks:
      - landfun-network

  nginx:
    image: nginx:alpine
    container_name: landfun-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - app
      - frontend
    networks:
      - landfun-network

networks:
  landfun-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  frontend_dist:
